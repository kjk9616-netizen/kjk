<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김진규 | AI 비즈니스 명함</title>
    <meta name="description" content="김진규 - AI 도입 전략 컨설턴트 및 바이브 코딩 강사. 35년 이상의 기술 및 전략 기획 경력.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <input type="checkbox" id="theme-switch" class="theme-switch" aria-label="다크모드 토글">
    
    <div class="card-container">
        <!-- Dark Mode Toggle Button -->
        <label for="theme-switch" class="toggle-label">
            <i class='bx bx-moon moon-icon'></i>
            <i class='bx bx-sun sun-icon'></i>
        </label>

        <div class="profile-section">
            <div class="profile-image-container">
                <div class="profile-ring"></div>
                <img src="내사진.jpg" alt="김진규 컨설턴트" class="profile-image">
            </div>
            <h1 class="name">김진규</h1>
            <h2 class="title">AI 도입 전략 컨설턴트<br><span class="highlight">& Vibe Coding 강사</span></h2>
            <div class="badge-container">
                <span class="badge">경력 35년+</span>
                <span class="badge badge-secondary">전문가</span>
            </div>
        </div>

        <div class="info-section">
            <div class="info-card">
                <div class="icon-wrapper">
                    <i class='bx bx-chip'></i>
                </div>
                <div class="info-text">
                    <h3>전자공학 & 경영 융합</h3>
                    <p>기술과 비즈니스를 아우르는 통찰력 제공</p>
                </div>
            </div>
            <div class="info-card">
                <div class="icon-wrapper">
                    <i class='bx bx-code-alt'></i>
                </div>
                <div class="info-text">
                    <h3>Vibe Coding 교육</h3>
                    <p>코딩 없이 AI와 대화하며 결과물 창출</p>
                </div>
            </div>
        </div>

        <!-- 간이 상담 폼 -->
        <div class="form-section">
            <h3>간편 상담 신청</h3>
            <p class="form-desc">AI 도입과 관련된 고민을 남겨주세요.</p>
            <form action="#" class="consult-form" onsubmit="event.preventDefault(); alert('상담이 신청되었습니다.');">
                <div class="input-group">
                    <i class='bx bx-user'></i>
                    <input type="text" placeholder="성함" required>
                </div>
                <div class="input-group">
                    <i class='bx bx-phone'></i>
                    <input type="tel" placeholder="연락처 (예: 010-1234-5678)" required>
                </div>
                <button type="submit" class="submit-btn">
                    <span>무료 상담 신청하기</span>
                    <i class='bx bx-right-arrow-alt'></i>
                </button>
            </form>
        </div>

        <div class="action-section">
            <a href="tel:010-5355-1030" class="btn primary-btn">
                <i class='bx bxs-phone-call'></i> 전화 연결
            </a>
            <a href="https://github.com/kjk" target="_blank" rel="noopener noreferrer" class="btn secondary-btn">
                <i class='bx bxl-github'></i> GitHub 방문
            </a>
        </div>
        
        <footer class="footer">
            <p>Made with Vibe Coding. AI transforms your business.</p>
        </footer>
    </div>
</body>
</html>
